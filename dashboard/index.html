<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Intense Holdings — Collin County Lead Dashboard</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
         background: #0f1117; color: #e2e8f0; min-height: 100vh; }
  header { background: #1a1d2e; border-bottom: 1px solid #2d3748; padding: 1rem 2rem;
           display: flex; align-items: center; gap: 1rem; }
  header h1 { font-size: 1.25rem; font-weight: 600; color: #fff; }
  header span { font-size: 0.8rem; color: #64748b; }
  .badge { background: #1e3a5f; color: #60a5fa; padding: 2px 10px;
           border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px,1fr));
           gap: 1rem; padding: 1.5rem 2rem; }
  .stat { background: #1a1d2e; border: 1px solid #2d3748; border-radius: 10px;
          padding: 1rem 1.25rem; }
  .stat .val { font-size: 1.75rem; font-weight: 700; color: #fff; }
  .stat .lbl { font-size: 0.75rem; color: #64748b; margin-top: 4px; }
  .section { padding: 0 2rem 2rem; }
  .section h2 { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.05em;
                color: #64748b; margin-bottom: 0.75rem; }
  table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
  th { background: #1a1d2e; color: #94a3b8; font-weight: 500; text-align: left;
       padding: 0.6rem 0.75rem; border-bottom: 1px solid #2d3748; position: sticky; top: 0; }
  td { padding: 0.55rem 0.75rem; border-bottom: 1px solid #1e2433; vertical-align: top; }
  tr:hover td { background: #1a1d2e; }
  .tag { display: inline-block; padding: 2px 8px; border-radius: 4px;
         font-size: 0.7rem; font-weight: 600; margin: 1px; }
  .tag-LP    { background:#7f1d1d; color:#fca5a5; }
  .tag-NOFC  { background:#78350f; color:#fcd34d; }
  .tag-PRO   { background:#1e3a5f; color:#93c5fd; }
  .tag-LN    { background:#312e81; color:#c4b5fd; }
  .tag-JUD   { background:#064e3b; color:#6ee7b7; }
  .tag-other { background:#1f2937; color:#9ca3af; }
  .score { display: inline-block; width: 36px; height: 36px; border-radius: 50%;
           text-align: center; line-height: 36px; font-size: 0.75rem; font-weight: 700; }
  .score-hi  { background:#064e3b; color:#6ee7b7; }
  .score-mid { background:#78350f; color:#fcd34d; }
  .score-lo  { background:#1f2937; color:#9ca3af; }
  .filters { display: flex; gap: 0.5rem; padding: 0 2rem 1rem; flex-wrap: wrap; }
  .filter-btn { background: #1a1d2e; border: 1px solid #2d3748; color: #94a3b8;
                padding: 4px 14px; border-radius: 20px; cursor: pointer;
                font-size: 0.78rem; transition: all 0.15s; }
  .filter-btn:hover, .filter-btn.active { background: #1e3a5f; color: #60a5fa;
                                           border-color: #3b82f6; }
  .search-bar { padding: 0 2rem 1rem; }
  .search-bar input { background: #1a1d2e; border: 1px solid #2d3748; color: #e2e8f0;
                      padding: 8px 14px; border-radius: 8px; width: 100%;
                      max-width: 400px; font-size: 0.85rem; }
  .empty { text-align: center; padding: 3rem; color: #4b5563; }
  .meta { font-size: 0.72rem; color: #4b5563; padding: 0.25rem 2rem 1rem; }
  a { color: #60a5fa; text-decoration: none; }
  a:hover { text-decoration: underline; }
  .flags { font-size: 0.7rem; color: #94a3b8; }
</style>
</head>
<body>

<header>
  <div>
    <h1>Intense Holdings &mdash; Collin County Leads</h1>
    <span id="meta-line">Loading...</span>
  </div>
  <div class="badge" id="county-badge">Collin County</div>
</header>

<div class="stats">
  <div class="stat"><div class="val" id="stat-total">—</div><div class="lbl">Total leads</div></div>
  <div class="stat"><div class="val" id="stat-addr">—</div><div class="lbl">With address</div></div>
  <div class="stat"><div class="val" id="stat-lp">—</div><div class="lbl">Lis Pendens</div></div>
  <div class="stat"><div class="val" id="stat-nofc">—</div><div class="lbl">Foreclosures</div></div>
  <div class="stat"><div class="val" id="stat-pro">—</div><div class="lbl">Probate</div></div>
  <div class="stat"><div class="val" id="stat-lien">—</div><div class="lbl">Liens / Judgments</div></div>
</div>

<div class="search-bar">
  <input type="text" id="search" placeholder="Search by name, address, doc type...">
</div>

<div class="filters" id="filter-bar">
  <button class="filter-btn active" data-cat="ALL">All</button>
  <button class="filter-btn" data-cat="LP">Lis Pendens</button>
  <button class="filter-btn" data-cat="NOFC">Foreclosure</button>
  <button class="filter-btn" data-cat="PRO">Probate</button>
  <button class="filter-btn" data-cat="LN">Lien</button>
  <button class="filter-btn" data-cat="JUD">Judgment</button>
</div>

<div class="section">
  <h2>Lead Records</h2>
  <div style="overflow-x:auto;">
    <table>
      <thead>
        <tr>
          <th>Score</th>
          <th>Type</th>
          <th>Owner</th>
          <th>Property Address</th>
          <th>Mailing Address</th>
          <th>Filed</th>
          <th>Doc #</th>
          <th>Amount</th>
          <th>Flags</th>
        </tr>
      </thead>
      <tbody id="records-tbody"></tbody>
    </table>
    <div class="empty" id="empty-msg" style="display:none">No records found.</div>
  </div>
</div>

<script>
let allRecords = [];
let activeFilter = 'ALL';
let searchTerm = '';

const tagClass = {
  LP:'tag-LP', NOFC:'tag-NOFC', PRO:'tag-PRO',
  LN:'tag-LN', CCJ:'tag-LN', JUD:'tag-JUD',
  LNIRS:'tag-LN', LNFED:'tag-LN',
};

function scoreClass(s) {
  return s >= 70 ? 'score-hi' : s >= 50 ? 'score-mid' : 'score-lo';
}

function renderRows() {
  const tbody = document.getElementById('records-tbody');
  const empty = document.getElementById('empty-msg');

  const filtered = allRecords.filter(r => {
    const catOk = activeFilter === 'ALL' || r.cat === activeFilter;
    const q = searchTerm.toLowerCase();
    const textOk = !q ||
      (r.owner||'').toLowerCase().includes(q) ||
      (r.prop_address||'').toLowerCase().includes(q) ||
      (r.prop_city||'').toLowerCase().includes(q) ||
      (r.cat_label||'').toLowerCase().includes(q) ||
      (r.doc_num||'').toLowerCase().includes(q);
    return catOk && textOk;
  });

  if (!filtered.length) {
    tbody.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  tbody.innerHTML = filtered.map(r => {
    const sc = r.score || 30;
    const tc = tagClass[r.cat] || 'tag-other';
    const propAddr = [r.prop_address, r.prop_city, r.prop_zip]
                     .filter(Boolean).join(', ');
    const mailAddr = [r.mail_address, r.mail_city, r.mail_state, r.mail_zip]
                     .filter(Boolean).join(', ');
    const flags = (r.flags||[]).join(' · ');
    const link = r.clerk_url
      ? `<a href="${r.clerk_url}" target="_blank">${r.doc_num||'view'}</a>`
      : (r.doc_num||'—');
    return `<tr>
      <td><span class="score ${scoreClass(sc)}">${sc}</span></td>
      <td><span class="tag ${tc}">${r.cat_label||r.cat}</span></td>
      <td>${r.owner||'—'}</td>
      <td>${propAddr||'—'}</td>
      <td style="font-size:0.75rem;color:#94a3b8">${mailAddr||'—'}</td>
      <td style="white-space:nowrap">${r.filed||'—'}</td>
      <td style="white-space:nowrap">${link}</td>
      <td>${r.amount||'—'}</td>
      <td class="flags">${flags}</td>
    </tr>`;
  }).join('');
}

function updateStats(records) {
  const count = cat => records.filter(r=>r.cat===cat).length;
  document.getElementById('stat-total').textContent = records.length;
  document.getElementById('stat-addr').textContent =
    records.filter(r=>r.prop_address).length;
  document.getElementById('stat-lp').textContent   = count('LP');
  document.getElementById('stat-nofc').textContent = count('NOFC');
  document.getElementById('stat-pro').textContent  = count('PRO');
  document.getElementById('stat-lien').textContent =
    records.filter(r=>['LN','JUD','CCJ','LNIRS','LNFED'].includes(r.cat)).length;
}

fetch('records.json')
  .then(r => r.json())
  .then(data => {
    allRecords = data.records || [];
    const dr = data.date_range || {};
    document.getElementById('meta-line').textContent =
      `Updated: ${(data.fetched_at||'').slice(0,16).replace('T',' ')} UTC | ` +
      `Range: ${dr.start||'?'} → ${dr.end||'?'}`;
    updateStats(allRecords);
    renderRows();
  })
  .catch(() => {
    document.getElementById('meta-line').textContent = 'Could not load records.json';
  });

document.getElementById('filter-bar').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeFilter = btn.dataset.cat;
  renderRows();
});

document.getElementById('search').addEventListener('input', e => {
  searchTerm = e.target.value;
  renderRows();
});
</script>
</body>
</html>
